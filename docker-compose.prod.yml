services:
  postgres:
    image: postgres:15-alpine
    env_file: .env.production
    ports: ["127.0.0.1:5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  frontend:
    build: 
      context: .
      dockerfile: ./apps/frontend/Dockerfile.prod
    env_file: .env.production
    ports: ["3000:3000"]
    restart: always
    depends_on:
      postgres:
        condition: service_healthy # Only starts frontend after DB is ready
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  admin:
    build:
      context: .
      dockerfile: ./apps/admin/Dockerfile.prod
    env_file: .env.production
    ports: ["3001:3000"]
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  socket-server:
    build:
      context: .
      dockerfile: ./apps/socket-server/Dockerfile.prod
    env_file: .env.production
    ports: ["3002:3002"]
    restart: always
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "3002"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data: