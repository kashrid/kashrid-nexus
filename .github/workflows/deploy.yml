name: 🚀 Kashrid Nexus Smart Deploy

on:
  push:
    branches: [main, dev]
    # Added root files to ensure the first setup and config changes trigger the build
    paths:
      - "apps/**"
      - "docker-compose.prod.yml"
      - "package.json"
      - ".github/workflows/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history so paths-filter can compare correctly

      - name: 🔍 Check Changed Files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend: ['apps/frontend/**']
            admin: ['apps/admin/**']
            socket: ['apps/socket-server/**']

      - name: 🛡️ Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Navigate to project root
            cd ~/kashrid-nexus

            # 1. Sync code from GitHub to VPS
            # Using fetch and reset is safer for production
            git fetch origin ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}

            # 2. Smart Rebuild logic
            # Only rebuilds the specific service if its folder had changes

            if [ "${{ steps.filter.outputs.frontend }}" == "true" ]; then
              echo "🛠️ Rebuilding Frontend..."
              docker compose -f docker-compose.prod.yml up -d --build --no-deps frontend
            fi

            if [ "${{ steps.filter.outputs.admin }}" == "true" ]; then
              echo "🛠️ Rebuilding Admin..."
              docker compose -f docker-compose.prod.yml up -d --build --no-deps admin
            fi

            if [ "${{ steps.filter.outputs.socket }}" == "true" ]; then
              echo "🛠️ Rebuilding Socket Server..."
              docker compose -f docker-compose.prod.yml up -d --build --no-deps socket-server
            fi

            # 3. Post-deploy cleanup
            # Removes old, unused image layers to save VPS disk space
            docker image prune -f
